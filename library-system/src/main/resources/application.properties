# Databasinstðllningar
spring.datasource.url=jdbc:sqlite:bibblan.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Anvðnd korrekt SQLite-dialect istðllet f—r H2
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# VIKTIGT: Anvðnd 'none' f—r att bevara befintlig databas
spring.jpa.hibernate.ddl-auto=none

# F—rhindra att JPA f—rs—ker skapa schema
spring.jpa.generate-ddl=false

# SQLite-specifika instðllningar
spring.jpa.properties.hibernate.dialect.metadata.use_sequences=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# Debugging (kan tas bort senare)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

